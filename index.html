<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS API 기능 현황 조사 결과 (2026) - 최신 업데이트</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --yes: #dcfce7;
            --yes-text: #166534;
            --no: #fee2e2;
            --no-text: #991b1b;
            --info: #f1f5f9;
            --info-text: #475569;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .platform-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 0.95rem;
            table-layout: fixed;
        }

        th,
        td {
            padding: 10px 6px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            vertical-align: middle;
        }

        th {
            color: var(--text-sub);
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            min-width: 60px;
            max-width: 100%;
            text-align: center;
            white-space: normal;
            /* ★ 줄바꿈 허용으로 변경 */
            word-break: break-word;
            overflow-wrap: break-word;
            line-height: 1.3;
        }

        .status-yes {
            background-color: var(--yes);
            color: var(--yes-text);
        }

        .status-no {
            background-color: var(--no);
            color: var(--no-text);
        }

        .status-info {
            background-color: var(--info);
            color: var(--info-text);
        }

        .source-box {
            background-color: var(--bg-color);
            padding: 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-sub);
            line-height: 1.5;
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        .source-title {
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 20px;
            }

            table {
                font-size: 0.9rem;
            }

            .status-badge {
                font-size: 0.8rem;
                padding: 4px 6px;
                min-width: 50px;
            }

            th,
            td {
                padding: 8px 4px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .card {
                padding: 16px;
            }

            .platform-name {
                font-size: 1.25rem;
            }

            .source-box {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>SNS 플랫폼 API 기능 조사 결과</h1>
            <p class="subtitle">2026년 기준 최신 공식 문서 검증 및 업데이트 버전</p>
        </header>

        <div class="grid" id="dashboard"></div>
    </div>

    <script>
        const data = {
            "Facebook": {
                "글": { "조회": "예", "작성": "예", "수정": "예", "삭제": "예" },
                "댓글": { "조회": "예", "작성": "예", "수정": "정보없음", "삭제": "정보없음" },
                "근거": "Graph API Page/feed 및 /{post-id} 엔드포인트로 글 전체 CRUD 지원 (GET/POST via feed, UPDATE/DELETE via post ID). 댓글은 조회/작성 지원되나 수정/삭제 문서 미명시."
            },
            "Instagram": {
                "글": { "조회": "본인한정", "작성": "아니오 (별도 Publishing API 필요)", "수정": "부분 (댓글 활성화/비활성화만)", "삭제": "본인한정" },
                "댓글": { "조회": "예", "작성": "정보없음", "수정": "아니오", "삭제": "아니오" },
                "근거": "IG Graph API에서 미디어 조회/삭제 지원, 수정은 댓글 설정만. 작성은 별도 Publishing 필요 (직접 미지원). 댓글 CRUD 미지원 (조회만)."
            },
            "YouTube": {
                "글": { "조회": "예", "작성": "예 (insert/upload)", "수정": "예 (update)", "삭제": "예 (delete)" },
                "댓글": { "조회": "예", "작성": "예 (insert)", "수정": "예 (update)", "삭제": "예 (delete)" },
                "근거": "YouTube Data API v3에서 비디오 및 댓글 모두 완전 CRUD 지원 확인."
            },
            "X (Twitter)": {
                "글": { "조회": "예", "작성": "예", "수정": "예 (제한적)", "삭제": "예" },
                "댓글": { "조회": "예", "작성": "예", "수정": "정보없음", "삭제": "정보없음" },
                "근거": "v2 API에서 작성/삭제 지원, 편집 기능 제한적 지원 (문서 부족하나 알려진 바 있음)."
            },
            "LinkedIn": {
                "글": { "조회": "예", "작성": "예", "수정": "예 (partial update)", "삭제": "예" },
                "댓글": { "조회": "정보없음", "작성": "정보없음", "수정": "정보없음", "삭제": "정보없음" },
                "근거": "Posts API에서 UGC 포스트 전체 CRUD 지원 (POST, GET, PATCH partial, DELETE). 댓글은 enable/disable만, 직접 CRUD 없음."
            },
            "Reddit": {
                "글": { "조회": "예", "작성": "예", "수정": "예", "삭제": "예" },
                "댓글": { "조회": "예", "작성": "예", "수정": "예", "삭제": "예" },
                "근거": "공식 API를 통한 포스트 및 댓글 완전 CRUD 지원."
            },
            "Pinterest": {
                "글": { "조회": "예", "작성": "예", "수정": "예", "삭제": "예" },
                "댓글": { "조회": "정보없음", "작성": "정보없음", "수정": "정보없음", "삭제": "정보없음" },
                "근거": "v5 API에서 Pins CRUD 지원 확인 (조회/작성/수정/삭제 엔드포인트 존재)."
            },
            "Threads": {
                "글": { "조회": "예", "작성": "예", "수정": "정보없음", "삭제": "예" },
                "댓글": { "조회": "예", "작성": "예", "수정": "정보없음", "삭제": "정보없음" },
                "근거": "Meta Threads API 기반. 대규모 게시물 관리 지원. 최근 답글 승인 및 관리 기능 업데이트됨. (문서 접근 제한으로 원본 유지)"
            },
            "Bluesky": {
                "글": { "조회": "예", "작성": "예", "수정": "예", "삭제": "예" },
                "댓글": { "조회": "예", "작성": "예", "수정": "정보없음", "삭제": "예" },
                "근거": "AT Protocol 기반 오픈 API. 포스트와 댓글이 동일 레코드 구조로 처리되어 삭제/조회 용이."
            },
            "네이버 블로그": {
                "글": { "조회": "예", "작성": "예", "수정": "예", "삭제": "예" },
                "댓글": { "조회": "정보없음", "작성": "정보없음", "수정": "정보없음", "삭제": "정보없음" },
                "근거": "네이버 개발자 센터 API v3 기준. 블로그 본문 CRUD 지원하나 댓글 관련 API는 공식 제공하지 않음."
            },
            "Blogger": {
                "글": { "조회": "예", "작성": "예", "수정": "예", "삭제": "예" },
                "댓글": { "조회": "예", "작성": "아니오 (직접 미지원)", "수정": "부분", "삭제": "예" },
                "근거": "Google Blogger API v3 기반. 포스트 CRUD 완전 지원. 댓글 작성 직접 미지원, 수정은 제한적."
            },
            "카카오톡 피드": {
                "글": { "조회": "정보없음", "작성": "예", "수정": "정보없음", "삭제": "예" },
                "댓글": { "조회": "정보없음", "작성": "정보없음", "수정": "정보없음", "삭제": "정보없음" },
                "근거": "카카오톡 채널 API 기반. 마케팅 목적의 피드 발신 중심. 조회/수정 및 댓글 기능은 API 범위 밖."
            }
        };

        const dashboard = document.getElementById('dashboard');

        function getBadgeClass(status) {
            if (status === '예') return 'status-yes';
            if (status === '아니오') return 'status-no';
            return 'status-info';
        }

        for (const [name, info] of Object.entries(data)) {
            const card = document.createElement('div');
            card.className = 'card';

            let html = `<div class="platform-name">${name}</div>`;
            html += `<table>
                <thead>
                    <tr><th>구분</th><th>조회</th><th>작성</th><th>수정</th><th>삭제</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>글</td>
                        <td><span class="status-badge ${getBadgeClass(info.글.조회)}">${info.글.조회}</span></td>
                        <td><span class="status-badge ${getBadgeClass(info.글.작성)}">${info.글.작성}</span></td>
                        <td><span class="status-badge ${getBadgeClass(info.글.수정)}">${info.글.수정}</span></td>
                        <td><span class="status-badge ${getBadgeClass(info.글.삭제)}">${info.글.삭제}</span></td>
                    </tr>
                    <tr>
                        <td>댓글</td>
                        <td><span class="status-badge ${getBadgeClass(info.댓글.조회)}">${info.댓글.조회}</span></td>
                        <td><span class="status-badge ${getBadgeClass(info.댓글.작성)}">${info.댓글.작성}</span></td>
                        <td><span class="status-badge ${getBadgeClass(info.댓글.수정)}">${info.댓글.수정}</span></td>
                        <td><span class="status-badge ${getBadgeClass(info.댓글.삭제)}">${info.댓글.삭제}</span></td>
                    </tr>
                </tbody>
            </table>`;
            html += `<div class="source-box"><span class="source-title">데이터 근거</span>${info.근거}</div>`;

            card.innerHTML = html;
            dashboard.appendChild(card);
        }
    </script>

</body>

</html>
