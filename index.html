<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS API 기능 현황 조사 결과 (2026) - 최신 업데이트</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --yes: #dcfce7;
            --yes-text: #166534;
            --no: #fee2e2;
            --no-text: #991b1b;
            --info: #f1f5f9;
            --info-text: #475569;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            /* 카드 자체 overflow 방지 */
        }

        .platform-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 0.95rem;
            table-layout: fixed;
            /* ★ 핵심: 셀 너비 고정 */
        }

        th,
        td {
            padding: 10px 6px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            word-break: break-word;
            /* ★ 한국어 긴 문장 break */
            overflow-wrap: break-word;
            hyphens: auto;
        }

        th {
            color: var(--text-sub);
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            min-width: 50px;
            text-align: center;
            white-space: nowrap;
        }

        .status-yes {
            background-color: var(--yes);
            color: var(--yes-text);
        }

        .status-no {
            background-color: var(--no);
            color: var(--no-text);
        }

        .status-info {
            background-color: var(--info);
            color: var(--info-text);
        }

        .source-box {
            background-color: var(--bg-color);
            padding: 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-sub);
            line-height: 1.5;
            word-break: break-word;
            /* ★ 긴 근거 텍스트 break */
            overflow-wrap: break-word;
            hyphens: auto;
        }

        .source-title {
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.6rem;
            }

            .card {
                padding: 18px;
            }

            table {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>SNS 플랫폼 API 기능 조사 결과</h1>
            <p class="subtitle">2026년 기준 최신 공식 문서 검증 및 업데이트 버전</p>
        </header>

        <div class="grid" id="dashboard"></div>
    </div>

    <script>
        // (기존 data 객체 그대로 유지 - 생략)
        const data = { /* 이전 메시지의 data 객체 복사해서 넣으세요 */ };

        const dashboard = document.getElementById('dashboard');

        function getBadgeClass(status) {
            if (status === '예') return 'status-yes';
            if (status === '아니오') return 'status-no';
            return 'status-info';
        }

        for (const [name, info] of Object.entries(data)) {
            const card = document.createElement('div');
            card.className = 'card';

            let html = `<div class="platform-name">${name}</div>`;
            html += `<table>
                <thead>
                    <tr><th>구분</th><th>조회</th><th>작성</th><th>수정</th><th>삭제</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>글</td>
                        <td><span class="status-badge ${getBadgeClass(info.글.조회)}">${info.글.조회}</span></td>
                        <td><span class="status-badge ${getBadgeClass(info.글.작성)}">${info.글.작성}</span></td>
                        <td><span class="status-badge ${getBadgeClass(info.글.수정)}">${info.글.수정}</span></td>
                        <td><span class="status-badge ${getBadgeClass(info.글.삭제)}">${info.글.삭제}</span></td>
                    </tr>
                    <tr>
                        <td>댓글</td>
                        <td><span class="status-badge ${getBadgeClass(info.댓글.조회)}">${info.댓글.조회}</span></td>
                        <td><span class="status-badge ${getBadgeClass(info.댓글.작성)}">${info.댓글.작성}</span></td>
                        <td><span class="status-badge ${getBadgeClass(info.댓글.수정)}">${info.댓글.수정}</span></td>
                        <td><span class="status-badge ${getBadgeClass(info.댓글.삭제)}">${info.댓글.삭제}</span></td>
                    </tr>
                </tbody>
            </table>`;
            html += `<div class="source-box"><span class="source-title">데이터 근거</span>${info.근거}</div>`;

            card.innerHTML = html;
            dashboard.appendChild(card);
        }
    </script>

</body>

</html>
